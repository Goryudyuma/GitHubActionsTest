name: Cron Job
on:
  schedule:
    - cron: '0/10 * * * *'
  push:
    branches:
      - master
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: download from master-branch.yml
        id: download_1
        uses: dawidd6/action-download-artifact@fe9d59ce33ce92db8a6ac90b2c8be6b6d90417c8 # v15
        continue-on-error: true
        with:
          workflow: master-branch.yml
          name: main
      - name: download from cronjob.yml
        id: download_2
        uses: dawidd6/action-download-artifact@fe9d59ce33ce92db8a6ac90b2c8be6b6d90417c8 # v15
        if: steps.download_1.outcome == 'failure'
        continue-on-error: true
        with:
          workflow: cronjob.yml
          name: main
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        if: steps.download_2.outcome == 'failure'
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        if: steps.download_2.outcome == 'failure'
        with:
          go-version-file: 'main/go.mod'
      - name: build
        run: go build
        if: steps.download_2.outcome == 'failure'
        working-directory: ./main
      - name: mv
        if: steps.download_2.outcome == 'failure'
        run: mv main/main ./main2 && rm -r main && mv main2 main
      - name: chmod +x
        run: chmod +x main
      - name: run
        run: ./main
        env:
          SLACK_WEBHOOK_URL_5MIN: ${{ secrets.slack_webhook_url_5min }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: steps.download_2.outcome == 'failure'
        with:
          name: main
          path: main
